name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Ensure tag matches versions
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "treestat") | .version')
          PYPROJECT_VERSION=$(python -c "import tomllib, pathlib; d = tomllib.loads(pathlib.Path('pyproject.toml').read_text('utf-8')); print(d['project']['version'])")

          echo "Tag:            $TAG"
          echo "Cargo.toml:     $CARGO_VERSION"
          echo "pyproject.toml: $PYPROJECT_VERSION"

          if [[ "$TAG" != "$CARGO_VERSION" ]]; then
            echo "Tag version ($TAG) does not match Cargo.toml version ($CARGO_VERSION)."
            exit 1
          fi

          if [[ "$TAG" != "$PYPROJECT_VERSION" ]]; then
            echo "Tag version ($TAG) does not match pyproject.toml version ($PYPROJECT_VERSION)."
            exit 1
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo files
        uses: Swatinem/rust-cache@v2

      - name: Build package
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-pypi:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/project/treestat/

    permissions:
      id-token: write

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true

